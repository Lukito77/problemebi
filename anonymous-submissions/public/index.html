<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>პრობლემის ანონიმური გაგზავნა</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>პრობლემის ანონიმური გაგზავნა</h1>
    </header>

    <form id="submission-form" novalidate>
      <div class="field">
        <label for="problem">თქვენი პრობლემა <span class="required">*</span></label>
        <textarea
          id="problem"
          name="problem"
          rows="6"
          maxlength="5000"
          placeholder="აღწერეთ რა ხდება..."
          required
        ></textarea>
        <small class="hint">მაქს. 5000 სიმბოლო. გთხოვთ იყავით თავაზიანი.</small>
        <span class="error-message" id="problem-error" role="alert" aria-live="polite"></span>
      </div>

      <!-- REMOVED: region dropdown. Locations are now Area > City only. -->

      <div class="field">
        <label for="area">მხარე <span class="required">*</span></label>
        <select id="area" name="area" required>
          <option value="">-- აირჩიეთ მხარე --</option>
        </select>
        <span class="error-message" id="area-error" role="alert" aria-live="polite"></span>
      </div>

      <div class="field">
        <label for="city">ქალაქი <span class="required">*</span></label>
        <select id="city" name="city" required disabled>
          <option value="">-- ჯერ აირჩიეთ მხარე --</option>
        </select>
        <span class="error-message" id="city-error" role="alert" aria-live="polite"></span>
      </div>

      <div class="checkbox-field">
        <label class="checkbox-label" for="consent">
          <input type="checkbox" id="consent" name="consent" required>
          <span>
            წავიკითხე წესები და მესმის, რომ ჩემი გაგზავნა ანონიმურია.
            არ შევიყვან პერსონალურ ინფორმაციას ჩემზე ან სხვა პირებზე.
          </span>
        </label>
        <span class="error-message" id="consent-error" role="alert" aria-live="polite"></span>
      </div>

      <button type="submit" id="submit-btn">ანონიმურად გაგზავნა</button>
      <span class="error-message" id="form-error" role="alert" aria-live="polite"></span>
    </form>

    <div id="thank-you" class="thank-you hidden">
      <h2>გმადლობთ გაგზავნისთვის!</h2>
      <p>თქვენი შეტყობინება მიღებულია ანონიმურად. გვაფასებთ, რომ გვითხარით.</p>
      <button type="button" id="submit-another">კიდევ ერთის გაგზავნა</button>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
