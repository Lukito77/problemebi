<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>პრობლემის ანონიმური გაგზავნა</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>პრობლემის ანონიმური გაგზავნა</h1>
    </header>

    <form id="submission-form" novalidate>
      <div class="field">
        <label for="problem">თქვენი პრობლემა <span class="required">*</span></label>
        <div class="textarea-wrapper">
          <textarea
            id="problem"
            name="problem"
            rows="6"
            maxlength="5000"
            placeholder="აღწერეთ რა ხდება..."
            required
          ></textarea>
          <div class="textarea-toolbar">
            <button type="button" id="attach-btn" class="toolbar-btn" title="ფოტოს დამატება">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </button>
            <button type="button" id="camera-btn" class="toolbar-btn" title="კამერით გადაღება">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            </button>
            <span id="attach-label" class="attach-label"></span>
          </div>
        </div>
        <input type="file" id="image" name="image" accept="image/*" style="display:none">
        <input type="file" id="camera" name="camera" accept="image/*" capture="environment" style="display:none">
        <small class="hint">მაქს. 5000 სიმბოლო. გთხოვთ იყავით თავაზიანი.</small>
        <span class="error-message" id="problem-error" role="alert" aria-live="polite"></span>
        <span class="error-message" id="image-error" role="alert" aria-live="polite"></span>
      </div>

      <div class="field">
        <label for="area">მხარე <span class="required">*</span></label>
        <select id="area" name="area" required>
          <option value="">-- აირჩიეთ მხარე --</option>
        </select>
        <span class="error-message" id="area-error" role="alert" aria-live="polite"></span>
      </div>

      <div class="field">
        <label for="city">ქალაქი <span class="required">*</span></label>
        <select id="city" name="city" required disabled>
          <option value="">-- ჯერ აირჩიეთ მხარე --</option>
        </select>
        <span class="error-message" id="city-error" role="alert" aria-live="polite"></span>
      </div>

      <div class="checkbox-field">
        <label class="checkbox-label" for="consent">
          <input type="checkbox" id="consent" name="consent" required>
          <span id="consent-text"></span>
        </label>
        <span class="error-message" id="consent-error" role="alert" aria-live="polite"></span>
      </div>

      <button type="submit" id="submit-btn">ანონიმურად გაგზავნა</button>
      <span class="error-message" id="form-error" role="alert" aria-live="polite"></span>
    </form>

    <div id="thank-you" class="thank-you hidden">
      <h2>გმადლობთ გაგზავნისთვის!</h2>
      <p>თქვენი შეტყობინება მიღებულია ანონიმურად. მადლობას გიხდით მხარდაჭერისთვის.</p>
      <button type="button" id="submit-another">კიდევ ერთის გაგზავნა</button>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
